<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d3a8c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d060"/>
      <stop offset="100%" style="stop-color:#c09040"/>
    </linearGradient>
  </defs>

  <!-- background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- subtle dot grid overlay -->
  <g opacity="0.06">
    <circle cx="128" cy="128" r="3" fill="white"/>
    <circle cx="256" cy="128" r="3" fill="white"/>
    <circle cx="384" cy="128" r="3" fill="white"/>
    <circle cx="128" cy="256" r="3" fill="white"/>
    <circle cx="384" cy="256" r="3" fill="white"/>
    <circle cx="128" cy="384" r="3" fill="white"/>
    <circle cx="256" cy="384" r="3" fill="white"/>
    <circle cx="384" cy="384" r="3" fill="white"/>
  </g>

  <!-- decorative circle -->
  <circle cx="420" cy="92" r="130" fill="white" opacity="0.04"/>

  <!-- 2x2 letter grid: I/E top, N/S bottom-left, F/T right, J/P bottom -->
  <!-- dividing cross lines -->
  <line x1="256" y1="136" x2="256" y2="376" stroke="url(#gold)" stroke-width="2" opacity="0.5"/>
  <line x1="136" y1="256" x2="376" y2="256" stroke="url(#gold)" stroke-width="2" opacity="0.5"/>

  <!-- quadrant labels (small, muted) -->
  <!-- top-left: I -->
  <text x="196" y="220" text-anchor="middle" font-family="-apple-system,sans-serif"
        font-size="52" font-weight="900" fill="white" opacity="0.22">I</text>
  <!-- top-right: E -->
  <text x="316" y="220" text-anchor="middle" font-family="-apple-system,sans-serif"
        font-size="52" font-weight="900" fill="white" opacity="0.22">E</text>
  <!-- bottom-left: N -->
  <text x="196" y="328" text-anchor="middle" font-family="-apple-system,sans-serif"
        font-size="52" font-weight="900" fill="white" opacity="0.22">N</text>
  <!-- bottom-right: J -->
  <text x="316" y="328" text-anchor="middle" font-family="-apple-system,sans-serif"
        font-size="52" font-weight="900" fill="white" opacity="0.22">J</text>

  <!-- center circle -->
  <circle cx="256" cy="256" r="58" fill="url(#bg)" stroke="url(#gold)" stroke-width="2.5"/>

  <!-- center "M" lettermark -->
  <text x="256" y="282" text-anchor="middle" font-family="-apple-system,sans-serif"
        font-size="62" font-weight="900" fill="url(#gold)" letter-spacing="-2">M</text>
</svg>
